name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"

jobs:
  managed:
    name: Managed build/test (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            rid: linux-x64
          - os: windows-2022
            rid: win-x64
          - os: macos-15-intel
            rid: osx-x64
          - os: macos-14
            rid: osx-arm64
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CsWebUi.sln

      - name: Build
        run: dotnet build CsWebUi.sln --configuration Release --no-restore

      - name: Test
        run: >-
          dotnet test CsWebUi.sln --configuration Release --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory artifacts/test-results/${{ matrix.rid }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.rid }}
          path: artifacts/test-results/${{ matrix.rid }}
          if-no-files-found: ignore
